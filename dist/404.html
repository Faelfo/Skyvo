<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <script>
      var path = window.location.pathname;
      var repo = '/NOME-DO-SEU-REPOSITORIO'; // ← mesmo nome do repo
      sessionStorage.setItem('redirect', path.replace(repo, '') || '/');
      window.location.replace(repo + '/');
    </script>
  </head>
  <body></body>
</html>
